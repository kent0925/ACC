<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAC 溝通系統</title>
<style>
    body { margin: 0; font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
    
    #buffer { height: 60px; background: white; border-bottom: 2px solid #ddd; display: flex; align-items: center; padding: 0 15px; font-size: 20px; font-weight: bold; }
    
    #main-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
    
    .btn { 
        background: white; 
        border: 1px solid #ccc; 
        border-radius: 10px; 
        padding: 5px; 
        text-align: center; 
        box-shadow: 2px 2px 5px #ccc; 
        cursor: pointer; 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1 / 1; 
        font-size: 16px; 
        overflow: hidden;
    }

    .btn:active {
        transform: scale(0.95); /* 按下去時縮小，模擬按壓感 */
        background: #e0e0e0;     /* 按下去時顏色變深 */
    }

    #social-bar { background: #e0e0e0; padding: 10px; display: flex; gap: 5px; overflow-x: auto; border-top: 1px solid #ccc; }
    #tab-bar { background: #333; color: white; display: flex; justify-content: space-around; padding: 15px; }
    .tab { cursor: pointer; padding: 5px 10px; }
</style>
</head>
<body>

    <div id="buffer-container" style="display: flex; align-items: center; background: white; border-bottom: 2px solid #ddd; height: 60px;">
        <div id="buffer" style="flex: 1; padding: 0 15px; font-size: 20px; font-weight: bold; overflow: hidden; white-space: nowrap;">點擊下方按鈕開始溝通...</div>
        <button onclick="clearBuffer()" style="margin-right: 10px; padding: 8px 12px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; background: #fff; cursor: pointer;">清除</button>
    </div>
    <div id="main-grid"></div>
    <div id="social-bar"></div>
    <div id="tab-bar"></div>

    <script>
        // 1. 內建 Emoji 映射
        const EMOJI_MAP = {
            "喝水": "💧", "咖啡": "☕", "吃藥": "💊", "血糖": "🩸", "癌症": "🎗️", 
            "止痛": "🩹", "牛肉": "🥩", "雞肉": "🍗", "豬肉": "🥓", "魚肉": "🐟", 
            "海鮮": "🦐", "麵類": "🍜", "湯類": "🍲", "米飯": "🍚", "蔬菜 (紅/黃)": "🥕", 
            "蔬菜 (綠/白/紫)": "🥦",
            "外套": "🧥", "長袖": "👕", "短袖": "👕", "長褲": "👖", "短褲": "🩳", 
            "襪子": "🧦", "拖鞋": "🩴",
            "開/關燈": "💡", "電視": "📺", "冷氣": "❄️", "電風扇": "🎐", "睡覺": "🛌",
            "公車": "🚌", "捷運": "🚇", "計程車": "🚕", "走路": "🚶",
            "手機": "📱", "手機充電": "🔋", "手錶": "⌚", "手錶充電": "⚡", 
            "公園": "🌳", "堤防": "🌊", "散步": "🚶‍♀️", "運動場": "🏃",
            "頭": "🧠", "眼睛": "👁️", "耳朵": "👂", "嘴巴": "👄", "喉嚨": "🗣️", 
            "胸口": "🫀", "肚子": "🤰", "胃": "🤢", "背部": "🔙", "腰部": "🎗️", 
            "手臂": "💪", "手": "✋", "手指": "☝️", "腿": "🦵", "腳": "🦶", "腳趾": "👣",
            "痛": "⚠️", "癢": "🐜", "麻": "⚡", "腫": "🎈", "無力": "🏳️", "休息": "🛌",
            "謝謝": "🙏", "抱歉": "🙇", "請幫我": "🙋", "我很開心": "😊"
        };

        // 2. 清除緩衝區函式
        function clearBuffer() {
            document.getElementById('buffer').innerText = '點擊下方按鈕開始溝通...';
            speakText('已清除'); 
        }

        // 3. 自動 Emoji 處理函式
        function applyEmoji(text) {
            if (!text) return "";
            if (/\p{Emoji}/u.test(text)) return text;
            for (let key in EMOJI_MAP) {
                if (text.includes(key)) return `${EMOJI_MAP[key]} ${text}`;
            }
            return `💬 ${text}`;
        }

        // 4. 畫面渲染主邏輯
        function initUI(allData) {
            // 渲染 Tab
            const themes = [...new Set(allData.map(item => item.theme))];
            const tabBar = document.getElementById('tab-bar');
            tabBar.innerHTML = ''; 
            themes.forEach(t => {
                const div = document.createElement('div');
                div.className = 'tab';
                div.innerText = t;
                div.onclick = () => renderGrid(allData, t);
                tabBar.appendChild(div);
            });

            // 渲染社交詞
            const bar = document.getElementById('social-bar');
            bar.innerHTML = ''; 
            allData.filter(d => d.isSocial).forEach(d => {
                const div = document.createElement('div');
                div.className = 'btn';
                div.innerText = applyEmoji(d.label);
                div.onclick = () => {
                    document.getElementById('buffer').innerText = d.label;
                    speakText(d.label);
                };
                bar.appendChild(div);
            });

            // 初始化渲染第一個 Tab
            if(themes.length > 0) {
                renderGrid(allData, themes[0]);
            }
        }

        // 5. 渲染網格
        function renderGrid(data, theme) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            data.filter(d => d.theme === theme && !d.isSocial).forEach(d => {
                const div = document.createElement('div');
                div.className = 'btn';
                div.innerText = applyEmoji(d.label);
                div.onclick = () => {
                    document.getElementById('buffer').innerText = d.label;
                    speakText(d.label);
                };
                grid.appendChild(div);
            });
        }

        // 6. 語音朗讀函式
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        // 7. 離線與連線資料處理邏輯
        const GAS_URL = "https://script.google.com/macros/s/AKfycbynWA6L3G9PaVK6dyyXwHvZXuzWPyaC5EQ9CJau8HxEhR9ZZAKSU6uXePj2Zt8b1tWybA/exec";

        const cachedData = localStorage.getItem('aac_data');
        if (cachedData) {
            initUI(JSON.parse(cachedData));
        }

        fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                localStorage.setItem('aac_data', JSON.stringify(data));
                if (!cachedData) {
                    initUI(data);
                }
            })
            .catch(err => {
                console.log("目前處於離線狀態，系統將繼續使用本地暫存資料。");
            });
    </script>
</body>
</html>
